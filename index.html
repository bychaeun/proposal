<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리의 일기 💘</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard Variable','Pretendard',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden;background:#05071a;}

.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(255,80,160,0.32) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 30%,rgba(0,60,180,0.35) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 50% 80%,rgba(0,30,120,0.4) 0%,transparent 60%),radial-gradient(ellipse 100% 80% at 50% 50%,rgba(5,10,40,1) 0%,#05071a 100%);animation:bgShift 12s ease-in-out infinite alternate;}
@keyframes bgShift{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(20deg);}}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:rgba(255,200,230,0.7);animation:twinkle var(--dur) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:1;transform:scale(1.8);}}


/* ── 커서 ── */
#cursor{position:fixed;pointer-events:none;z-index:99999;width:26px;height:26px;transform:translate(-13px,-13px);will-change:transform;}
#cursor.clicking{transform:translate(-13px,-13px) scale(0.72);}
.trail{position:fixed;pointer-events:none;z-index:99990;animation:trailFade var(--td) ease-out forwards;}
@keyframes trailFade{0%{opacity:0.95;transform:scale(var(--ts)) rotate(var(--tr));}40%{opacity:0.7;transform:scale(calc(var(--ts)*0.8)) rotate(calc(var(--tr)+90deg));}100%{opacity:0;transform:scale(0.05) rotate(calc(var(--tr)+200deg));}}
.hp{position:fixed;pointer-events:none;z-index:99998;animation:hpAnim var(--dur2) cubic-bezier(0.22,1,0.36,1) forwards;}
@keyframes hpAnim{0%{opacity:1;transform:translate(0,0) scale(var(--s));}60%{opacity:0.9;transform:translate(var(--tx),var(--ty60)) scale(calc(var(--s)*1.1));}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(calc(var(--s)*0.3));}}

/* ── 글래스 ── */
.glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,0.13);border-radius:20px;}
.glass-strong{background:rgba(255,255,255,0.11);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:1px solid rgba(255,180,220,0.2);border-radius:20px;}

/* ════════════════════════
   데스크탑 레이아웃
════════════════════════ */
.app{position:relative;z-index:1;width:100%;max-width:1560px;margin:0 auto;padding:36px 60px 80px;}

/* 헤더 */
.header{text-align:center;padding:32px 0 28px;}
.header-badge{display:inline-block;background:rgba(255,100,180,0.15);border:1px solid rgba(255,130,200,0.3);border-radius:999px;padding:5px 16px;font-size:10px;font-weight:700;color:rgba(255,180,220,0.7);letter-spacing:2px;margin-bottom:14px;}
.header h1{font-size:40px;font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1.2;}
.header h1 em{font-style:normal;background:linear-gradient(135deg,#ff6eb4,#ff9de2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-date{margin-top:8px;font-size:12px;color:rgba(255,200,230,0.5);font-weight:500;letter-spacing:1.5px;}

/* D+n 행 — 헤더 아래 가득 */
.dday-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;max-width:600px;margin-left:auto;margin-right:auto;}
.dday-card{padding:20px 16px;text-align:center;}
.dday-card .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#ff6eb4,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;letter-spacing:-1px;}
.dday-card .lbl{font-size:11px;color:rgba(255,200,230,0.45);font-weight:600;letter-spacing:0.8px;margin-top:5px;}

/* 메인 3컬럼 — 프로필 | 달력(넓게) | 통계 */
.main-grid{
  display:grid;
  grid-template-columns:280px 1fr 220px;
  gap:24px;
  align-items:start;
}

/* 왼쪽 — 프로필 */
.left-panel{display:flex;flex-direction:column;gap:14px;}
.profile-row{display:grid;grid-template-columns:1fr;gap:12px;}
.profile-card{padding:20px 18px;}
.profile-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:11px;border:1.5px solid rgba(255,150,210,0.35);}
.profile-avatar.her{background:linear-gradient(135deg,rgba(255,100,180,0.35),rgba(200,80,255,0.25));}
.profile-avatar.him{background:linear-gradient(135deg,rgba(80,140,255,0.35),rgba(100,200,255,0.2));}
.profile-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px;margin-bottom:3px;}
.profile-since{font-size:10px;font-weight:600;margin-bottom:10px;}
.profile-since.her{color:#ff9de2;}
.profile-since.him{color:#7dd3fc;}
.profile-chips{display:flex;flex-direction:column;gap:5px;}
.pchip{font-size:10px;font-weight:600;color:rgba(255,220,240,0.65);line-height:1.5;}
.pchip span{display:inline-block;background:rgba(255,255,255,0.08);border-radius:6px;padding:2px 7px;margin:1px 2px 1px 0;font-size:10px;}

/* 오른쪽 — 통계 */
.right-panel{display:flex;flex-direction:column;gap:14px;}
.stats-row{display:grid;grid-template-columns:1fr;gap:10px;}
.stat-card{padding:18px 12px;text-align:center;cursor:none;transition:all 0.18s;border-radius:20px;}
.stat-card.clickable:hover{background:rgba(255,100,180,0.14);transform:translateY(-2px);}
.s-num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#ff9de2,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.s-lbl{font-size:10px;color:rgba(255,200,230,0.45);font-weight:600;letter-spacing:0.3px;margin-top:5px;}
.stat-card.clickable .s-lbl::after{content:' ›';color:rgba(255,150,200,0.5);}

/* 가운데 — 달력 */
.center-panel{display:flex;flex-direction:column;gap:16px;}
.section-label{font-size:10px;font-weight:700;color:rgba(255,180,220,0.5);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px;}

/* 달력 — 고정 크기로 안정적으로 */
.calendar-wrap{overflow:hidden;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.cal-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{width:34px;height:34px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;color:rgba(255,220,240,0.7);font-size:16px;cursor:none;transition:all 0.18s;display:flex;align-items:center;justify-content:center;}
.cal-nav button:hover{background:rgba(255,100,180,0.2);border-color:rgba(255,130,200,0.4);color:#ff9de2;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:14px 20px 4px;}
.cal-weekdays span{text-align:center;font-size:12px;font-weight:700;color:rgba(255,200,230,0.3);}
.cal-weekdays span:first-child{color:rgba(255,120,120,0.55);}
.cal-weekdays span:last-child{color:rgba(120,180,255,0.55);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 20px 24px;gap:6px;}
.cal-day{
  height:64px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:12px;font-size:14px;font-weight:700;
  color:rgba(255,220,240,0.7);cursor:none;position:relative;transition:all 0.16s;
}
.cal-day:hover:not(.empty){background:rgba(255,100,180,0.14);color:#fff;}
.cal-day.empty{pointer-events:none;}
.cal-day.sun{color:rgba(255,140,140,0.65);}
.cal-day.sat{color:rgba(140,190,255,0.65);}
.cal-day.today{background:rgba(255,100,180,0.12);color:#ffb3d9;}
.cal-day.today .day-num::after{content:'';display:block;width:4px;height:4px;background:#ff6eb4;border-radius:50%;margin:2px auto 0;}
.cal-day.has-memo .day-num{width:34px;height:34px;background:linear-gradient(135deg,#ff6eb4,#e879f9);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 12px rgba(255,100,180,0.4),0 0 0 3px rgba(255,100,180,0.13);}
.memo-dot{width:4px;height:4px;border-radius:50%;background:#ff6eb4;margin-top:1px;display:none;}
.cal-day.has-memo .memo-dot{display:block;}

/* ════════════════════════
   시트/모달 공통
════════════════════════ */
.backdrop{position:fixed;inset:0;background:rgba(5,7,26,0.75);backdrop-filter:blur(12px);z-index:2000;display:none;align-items:flex-end;justify-content:center;padding:20px;}
.backdrop.open{display:flex;animation:bdIn 0.22s ease;}
@keyframes bdIn{from{opacity:0}to{opacity:1}}

.sheet{background:rgba(15,5,35,0.94);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,130,200,0.2);border-radius:28px 28px 22px 22px;width:100%;max-width:540px;max-height:84vh;overflow-y:auto;box-shadow:0 -8px 60px rgba(255,80,160,0.15);animation:sheetUp 0.32s cubic-bezier(0.34,1.4,0.64,1);}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:38px;height:4px;background:rgba(255,150,210,0.25);border-radius:999px;margin:14px auto 0;}
.sheet-header{padding:16px 24px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);}
.sheet-title{font-size:14px;font-weight:800;color:#fff;}
.sheet-close{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:rgba(255,200,230,0.65);font-size:13px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.sheet-close:hover{background:rgba(255,100,180,0.2);color:#ff9de2;}
.sheet-body{padding:16px 24px 24px;}

/* 날짜 내역서 */
.log-year{font-size:11px;font-weight:700;color:rgba(255,180,220,0.4);letter-spacing:2px;margin:16px 0 10px;}
.log-year:first-child{margin-top:0;}
.log-item{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.log-item:last-child{border-bottom:none;}
.log-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:4px;}
.log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.log-dot.pink{background:linear-gradient(135deg,#ff6eb4,#e879f9);box-shadow:0 0 8px rgba(255,100,180,0.5);}
.log-dot.blue{background:linear-gradient(135deg,#38bdf8,#818cf8);box-shadow:0 0 8px rgba(56,189,248,0.4);}
.log-dot.green{background:linear-gradient(135deg,#4ade80,#34d399);box-shadow:0 0 8px rgba(74,222,128,0.4);}
.log-line{width:1px;flex:1;background:rgba(255,255,255,0.07);margin-top:4px;}
.log-content{flex:1;}
.log-date{font-size:11px;font-weight:700;color:rgba(255,180,220,0.55);letter-spacing:0.5px;margin-bottom:4px;}
.log-title{font-size:13px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.4;}
.log-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.log-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(255,100,180,0.15);border:1px solid rgba(255,130,200,0.25);color:#ffb3d9;}
.log-desc{font-size:12px;color:rgba(255,210,235,0.65);line-height:1.8;}

/* 달력 날짜 모달 */
.preset-entry{background:rgba(255,100,180,0.09);border:1px solid rgba(255,130,200,0.18);border-radius:16px;padding:16px;margin-bottom:14px;}
.entry-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:8px;}
.tag-mini{display:inline-block;background:rgba(255,100,180,0.18);border:1px solid rgba(255,130,200,0.28);color:#ffb3d9;font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin:0 4px 4px 0;}
.entry-body{font-size:12px;color:rgba(255,210,235,0.7);line-height:1.85;}
.memo-lbl{font-size:10px;font-weight:700;color:rgba(255,180,220,0.4);letter-spacing:2px;margin-bottom:8px;}
.memo-textarea{width:100%;min-height:88px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,130,200,0.18);border-radius:14px;padding:13px 15px;font-family:'Pretendard Variable','Pretendard',sans-serif;font-size:13px;color:#fff;line-height:1.8;resize:none;outline:none;cursor:none;transition:border 0.2s,background 0.2s;}
.memo-textarea:focus{border-color:rgba(255,110,180,0.45);background:rgba(255,255,255,0.08);cursor:text;}
.memo-textarea::placeholder{color:rgba(255,180,220,0.28);}
.modal-footer{padding:12px 24px 24px;display:flex;gap:8px;}
.btn-save{flex:1;padding:14px;background:linear-gradient(135deg,#ff3d8b,#e879f9);color:#fff;border:none;border-radius:14px;font-family:'Pretendard Variable','Pretendard',sans-serif;font-size:13px;font-weight:800;cursor:none;box-shadow:0 4px 20px rgba(255,60,140,0.35);transition:all 0.15s;}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(255,60,140,0.45);}
.btn-del{padding:14px 18px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,200,230,0.55);border-radius:14px;font-family:'Pretendard Variable','Pretendard',sans-serif;font-size:13px;cursor:none;transition:all 0.15s;}
.btn-del:hover{background:rgba(255,80,80,0.14);border-color:rgba(255,100,100,0.28);color:#fca5a5;}

/* 관계 팝업 아이템 */
.rel-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.rel-item:last-child{border-bottom:none;}
.rel-icon{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.rel-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px;}
.rel-desc{font-size:11px;color:rgba(255,210,235,0.55);}

.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(30,0,55,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,130,200,0.28);color:#ffb3d9;padding:10px 22px;border-radius:999px;font-size:12px;font-weight:700;z-index:9999;transition:transform 0.32s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ════════════════════════
   반응형 — 모바일 (≤768px)
════════════════════════ */
@media(max-width:900px){
  .app{max-width:100%;padding:0 18px 100px;}
  .header{padding:44px 0 22px;}
  .header h1{font-size:28px;}
  .dday-row{max-width:100%;gap:10px;margin-bottom:18px;}
  .dday-card .num{font-size:20px;}
  .main-grid{grid-template-columns:1fr;gap:16px;}
  .profile-row{grid-template-columns:1fr 1fr;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .cal-day{height:auto;aspect-ratio:1;font-size:12px;}
  .cal-day.has-memo .day-num{width:28px;height:28px;font-size:11px;}
}

/* ── 스크롤바 ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);border-radius:999px;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ff6eb4,#a78bfa);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#ff3d8b,#e879f9);}
*{scrollbar-width:thin;scrollbar-color:#ff6eb4 rgba(255,255,255,0.03);}
</style>
</head>
<body>

<div class="bg"></div>
<div class="stars" id="stars"></div>

<div id="cursor">
  <svg id="cursorStar" width="26" height="26" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">
    <path id="starPath" d="M1152.7,380l84.1,258.9c18.1,55.7,70.1,93.5,128.7,93.5h272.2c131.1,0,185.6,167.7,79.5,244.8l-220.2,160c-47.4,34.5-67.3,95.5-49.2,151.3l84.1,258.9c40.5,124.7-102.2,228.3-208.2,151.3l-220.2-160c-47.4-34.5-111.6-34.5-159.1,0l-220.2,160c-106,77-248.7-26.6-208.2-151.3l84.1-258.9c18.1-55.7-1.7-116.8-49.2-151.3l-220.2-160c-106-77-51.5-244.8,79.5-244.8h272.2c58.6,0,110.6-37.7,128.7-93.5l84.1-258.9c40.5-124.7,216.9-124.7,257.4,0Z" fill="white"/>
  </svg>
</div>

<div class="toast" id="toast"></div>

<!-- 만남 기록 시트 -->
<div class="backdrop" id="logBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">📋 만남 기록</div>
      <button class="sheet-close" onclick="closeLog()">✕</button>
    </div>
    <div class="sheet-body" id="logBody"></div>
  </div>
</div>

<!-- 도시 시트 -->
<div class="backdrop" id="cityBackdrop">
  <div class="sheet" style="max-height:60vh;">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">📍 함께한 도시</div>
      <button class="sheet-close" onclick="closeCities()">✕</button>
    </div>
    <div class="sheet-body" id="cityBody"></div>
  </div>
</div>

<!-- 관계 시트 -->
<div class="backdrop" id="relBackdrop">
  <div class="sheet" style="max-height:60vh;">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">🔥 관계 기록</div>
      <button class="sheet-close" onclick="closeRel()">✕</button>
    </div>
    <div class="sheet-body" id="relBody"></div>
  </div>
</div>

<!-- 달력 날짜 모달 -->
<div class="backdrop" id="modalBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="modalDateLabel">날짜</div>
      <button class="sheet-close" onclick="closeModal()">✕</button>
    </div>
    <div class="sheet-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-save" onclick="saveMemo()">저장 💕</button>
      <button class="btn-del" onclick="deleteMemo()">삭제</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-badge">우리의 일기</div>
    <h1>정채은 <em>×</em> 오신구</h1>
    <div class="header-date">2026년 4월 16일 💘</div>
  </div>

  <!-- D+n -->
  <div class="dday-row">
    <div class="dday-card glass"><div class="num" id="ddayNum">—</div><div class="lbl">함께한 날</div></div>
    <div class="dday-card glass"><div class="num" id="firstMeetNum">—</div><div class="lbl">처음 만난 지</div></div>
    <div class="dday-card glass"><div class="num" id="memoCount">0</div><div class="lbl">기록 수</div></div>
  </div>

  <!-- 메인 그리드 -->
  <div class="main-grid">

    <!-- 왼쪽: 프로필 -->
    <div class="left-panel">
      <div class="section-label">우리</div>
      <div class="profile-row">
        <div class="profile-card glass-strong">
          <div class="profile-avatar her">🌸</div>
          <div class="profile-name">정채은</div>
          <div class="profile-since her">1997.02.16</div>
          <div class="profile-chips">
            <div class="pchip"><span>INTJ</span></div>
            <div class="pchip"><span>📍 광주광역시</span></div>

          <div class="profile-avatar him">🌙</div>
          <div class="profile-name">오신구</div>
          <div class="profile-since him">1997.11.01</div>
          <div class="profile-chips">
            <div class="pchip"><span>INFJ</span></div>
            <div class="pchip"><span>📍 청주</span></div>
            <div class="pchip"><span>고향 음성군</span></div>
            <div class="pchip"><span>막내 (누나 2명)</span></div>
          </div>

    </div>

    <!-- 가운데: 달력 -->
    <div class="center-panel">
      <div class="section-label">우리의 기록</div>
      <div class="calendar-wrap glass">
        <div class="cal-header">
          <div class="cal-title" id="calTitle">2026년 4월</div>
          <div class="cal-nav">
            <button onclick="prevMonth()">‹</button>
            <button onclick="nextMonth()">›</button>
          </div>
        </div>
        <div class="cal-weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- 오른쪽: 통계 -->
    <div class="right-panel">
      <div class="section-label">통계</div>
      <div class="stats-row">
        <div class="stat-card glass clickable" onclick="openLog()">
          <div class="s-num">6</div>
          <div class="s-lbl">만난 횟수</div>
        </div>
        <div class="stat-card glass clickable" onclick="openCities()">
          <div class="s-num">2</div>
          <div class="s-lbl">함께한 도시</div>
        </div>
        <div class="stat-card glass clickable" onclick="openRel()">
          <div class="s-num" id="sexCount">1</div>
          <div class="s-lbl">관계</div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /app -->

<script>
const PRESET = {
  '2026-04-04':{title:'🎪 첫 만남 — 왕인박사 축제',tags:['첫 만남','광주','7명 모임'],dot:'pink',body:'박정민 친구로 처음 모임 참여. 7명이서 영인 왕인박사 축제 갔다가 룸소방에서 술 마심. 신구랑 정운이 미리 와서 기다리는 동안 인형뽑기도 같이 했음! 내가 술에 취해서 신구 손을 냅다 잡아버림... 😅'},
  '2026-04-11':{title:'🎬 살목지 + 삼겹살 소주',tags:['영화','4인 모임'],dot:'blue',body:'다영이, 지환오빠랑 넷이서 살목지 봤음. 끝나고 삼겹살에 소주 ㅎㅎ 신구 막걸리 2잔에 힘들어했던 거 너무 귀여웠음 ㅋㅋ 이때 많이 친해졌고 서로 좋아한다고 표현함 💕'},
  '2026-04-12':{title:'🦋 한정식 + 광주 동물원',tags:['첫 단둘 데이트'],dot:'green',body:'신구랑 처음으로 둘이서 만난 날!! 한정식 먹고 카페도 갔는데 갑자기 동물원까지 ㅋㅋ 벚꽃이 너무 예뻤고 날씨도 완벽했음. 설레고 행복한 하루였음 🌸'},
  '2026-04-16':{title:'📞 우리가 하나 된 날 💑',tags:['♡ 사귄 날','전화 고백'],dot:'pink',body:'내가 먼저 전화로 사귀자고 고백한 날! 어차피 서로 좋아하는 거 알고 손도 잡았는데 왜 안 사귀나 싶어서 내가 먼저 말해버림 ♡'},
  '2026-04-18':{title:'🌙 새벽 2시 만남',tags:['새벽 만남','숙소','넷플릭스'],dot:'blue',body:'대화하다 보고싶다고 밤 12시에 갑자기 숙소 잡고 내려온다는 신구.. 새벽 2시에 만나서 소주에 과자 육포 먹으면서 블랙미러 보다가... 야한 짓 해버림 😳 손만 잡아봤는데 이날 모든 걸 다 해버림'},
  '2026-04-19':{title:'💊 사후 피임약 복용',tags:['건강'],dot:'green',body:'응급실에서 사후 피임약 처방받음. 약사님이 결혼을 하라고 하셨다... ㅋㅋㅋㅋ 다음을 기대할게 😏'},
  '2026-04-25':{title:'🌃 양동 맥주 축제 → 새벽 등장',tags:['새벽 드라이브','산책'],dot:'pink',body:'정운이, 이수민이랑 양동 맥주축제 즐기고 있었는데 내가 화난 줄 알고 신구가 새벽 1시에 와줬음..! 다들 헤어지고 둘이서 생활공원 산책하고, 차 안에서 야한 짓도 했당 😳 오전 5시에 피곤한데 청주로 올라간 신구 ㅠㅠ'}
};

const REL_LOG = [
  {date:'2026.04.18',icon:'🌙',title:'첫 번째',desc:'새벽 숙소에서. 손만 잡아봤는데 이날 모든 걸 다 해버림 😳'}
];

const CITIES = [
  {emoji:'🏯',name:'영인',desc:'왕인박사 축제 (2026.04.04)'},
  {emoji:'🌸',name:'광주',desc:'동물원·한정식·맥주축제·생활공원 (2026.04.11~25)'}
];

let curY=2026,curM=4,activeDate=null;
function getMemos(){try{return JSON.parse(localStorage.getItem('diary_v3')||'{}')}catch{return{}}}
function setMemos(o){localStorage.setItem('diary_v3',JSON.stringify(o))}
function dk(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function updateDday(){
  const s=new Date('2026-04-16'),f=new Date('2026-04-04'),n=new Date();
  const d1=Math.floor((n-s)/86400000),d2=Math.floor((n-f)/86400000);
  document.getElementById('ddayNum').textContent=d1>=0?`D+${d1}`:`D${d1}`;
  document.getElementById('firstMeetNum').textContent=d2>=0?`${d2}일`:'-';
  document.getElementById('memoCount').textContent=Object.keys(PRESET).length+Object.keys(getMemos()).length;
}

function renderCalendar(){
  const y=curY,m=curM;
  document.getElementById('calTitle').textContent=`${y}년 ${m}월`;
  const firstDay=new Date(y,m-1,1).getDay(),lastDate=new Date(y,m,0).getDate();
  const tn=new Date(),todayKey=dk(tn.getFullYear(),tn.getMonth()+1,tn.getDate());
  const memos=getMemos(),g=document.getElementById('calGrid');
  g.innerHTML='';
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';g.appendChild(e);}
  for(let d=1;d<=lastDate;d++){
    const key=dk(y,m,d),dow=new Date(y,m-1,d).getDay(),hasMemo=!!PRESET[key]||!!memos[key];
    const el=document.createElement('div');
    let cls='cal-day';
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
    if(key===todayKey)cls+=' today';if(hasMemo)cls+=' has-memo';
    el.className=cls;
    el.innerHTML=`<span class="day-num">${d}</span><span class="memo-dot"></span>`;
    el.onclick=()=>openModal(y,m,d);
    g.appendChild(el);
  }
}
function prevMonth(){curM--;if(curM<1){curM=12;curY--;}renderCalendar();}
function nextMonth(){curM++;if(curM>12){curM=1;curY++;}renderCalendar();}

/* ── 시트 열기/닫기 공통 ── */
function openSheet(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeSheet(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}

/* ── 만남 기록 ── */
function openLog(){
  const body=document.getElementById('logBody');body.innerHTML='';
  const entries=Object.entries(PRESET).sort((a,b)=>a[0].localeCompare(b[0]));
  let lastYear='';
  entries.forEach(([key,p],i)=>{
    const yr=key.slice(0,4);
    if(yr!==lastYear){const yl=document.createElement('div');yl.className='log-year';yl.textContent=yr+'년';body.appendChild(yl);lastYear=yr;}
    const [,mm,dd]=key.split('-');
    const item=document.createElement('div');item.className='log-item';
    item.innerHTML=`<div class="log-dot-col"><div class="log-dot ${p.dot}"></div>${i<entries.length-1?'<div class="log-line"></div>':''}</div>
      <div class="log-content">
        <div class="log-date">${mm}월 ${dd}일</div>
        <div class="log-title">${p.title}</div>
        <div class="log-tags">${p.tags.map(t=>`<span class="log-tag">${t}</span>`).join('')}</div>
        <div class="log-desc">${p.body}</div>
      </div>`;
    body.appendChild(item);
  });
  openSheet('logBackdrop');
}
function closeLog(){closeSheet('logBackdrop');}
document.getElementById('logBackdrop').addEventListener('click',function(e){if(e.target===this)closeLog();});

/* ── 도시 ── */
function openCities(){
  const body=document.getElementById('cityBody');body.innerHTML='';
  CITIES.forEach(c=>{
    const el=document.createElement('div');el.className='rel-item';
    el.innerHTML=`<div class="rel-icon">${c.emoji}</div><div><div class="rel-name">${c.name}</div><div class="rel-desc">${c.desc}</div></div>`;
    body.appendChild(el);
  });
  openSheet('cityBackdrop');
}
function closeCities(){closeSheet('cityBackdrop');}
document.getElementById('cityBackdrop').addEventListener('click',function(e){if(e.target===this)closeCities();});

/* ── 관계 ── */
function openRel(){
  const body=document.getElementById('relBody');body.innerHTML='';
  const total=document.createElement('div');
  total.style.cssText='text-align:center;padding:16px 0 20px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:8px;';
  total.innerHTML=`<div style="font-size:36px;font-weight:800;background:linear-gradient(135deg,#ff6eb4,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${REL_LOG.length}회</div><div style="font-size:11px;color:rgba(255,200,230,0.45);margin-top:4px;font-weight:600;letter-spacing:1px;">TOTAL</div>`;
  body.appendChild(total);
  REL_LOG.forEach(r=>{
    const el=document.createElement('div');el.className='rel-item';
    el.innerHTML=`<div class="rel-icon">${r.icon}</div><div><div class="rel-name">${r.title}</div><div style="font-size:10px;color:rgba(255,180,220,0.55);margin-bottom:3px;">${r.date}</div><div class="rel-desc">${r.desc}</div></div>`;
    body.appendChild(el);
  });
  openSheet('relBackdrop');
}
function closeRel(){closeSheet('relBackdrop');}
document.getElementById('relBackdrop').addEventListener('click',function(e){if(e.target===this)closeRel();});

/* ── 달력 모달 ── */
function openModal(y,m,d){
  const key=dk(y,m,d);activeDate=key;
  document.getElementById('modalDateLabel').textContent=`${y}년 ${m}월 ${d}일`;
  const memos=getMemos(),body=document.getElementById('modalBody');body.innerHTML='';
  if(PRESET[key]){
    const p=PRESET[key],div=document.createElement('div');div.className='preset-entry';
    div.innerHTML=`<div class="entry-title">${p.title}</div>
      <div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px">${p.tags.map(t=>`<span class="tag-mini">${t}</span>`).join('')}</div>
      <div class="entry-body">${p.body}</div>`;
    body.appendChild(div);
  }
  const md=document.createElement('div');
  md.innerHTML=`<div class="memo-lbl">MY MEMO</div><textarea class="memo-textarea" id="modalMemoText" placeholder="이날의 기억을 적어줘... 💕">${memos[key]||''}</textarea>`;
  body.appendChild(md);
  openSheet('modalBackdrop');
}
function closeModal(){closeSheet('modalBackdrop');activeDate=null;}
document.getElementById('modalBackdrop').addEventListener('click',function(e){if(e.target===this)closeModal();});

function saveMemo(){
  if(!activeDate)return;
  const t=document.getElementById('modalMemoText').value.trim(),memos=getMemos();
  if(t)memos[activeDate]=t;else delete memos[activeDate];
  setMemos(memos);renderCalendar();updateDday();showToast('저장됐어 💕');closeModal();
}
function deleteMemo(){
  if(!activeDate)return;
  const memos=getMemos();delete memos[activeDate];
  setMemos(memos);renderCalendar();updateDday();showToast('삭제했어');closeModal();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}


/* ── 커서 ── */
const cursorEl=document.getElementById('cursor'),starPath=document.getElementById('starPath');
let starAngle=0;
(function rotateStar(){starAngle=(starAngle+1.05)%360;starPath.setAttribute('transform',`rotate(${starAngle},1024,1024)`);requestAnimationFrame(rotateStar);})();

const TRAIL_COLORS=['#ff4d6d','#ff9a3c','#ffe033','#4ade80','#38bdf8','#a78bfa','#f472b6','#ff6eb4','#34d399','#fb923c'];
const STAR_D='M1152.7,380l84.1,258.9c18.1,55.7,70.1,93.5,128.7,93.5h272.2c131.1,0,185.6,167.7,79.5,244.8l-220.2,160c-47.4,34.5-67.3,95.5-49.2,151.3l84.1,258.9c40.5,124.7-102.2,228.3-208.2,151.3l-220.2-160c-47.4-34.5-111.6-34.5-159.1,0l-220.2,160c-106,77-248.7-26.6-208.2-151.3l84.1-258.9c18.1-55.7-1.7-116.8-49.2-151.3l-220.2-160c-106-77-51.5-244.8,79.5-244.8h272.2c58.6,0,110.6-37.7,128.7-93.5l84.1-258.9c40.5-124.7,216.9-124.7,257.4,0Z';
let trailCount=0,lastTrailTime=0;
function spawnTrail(x,y){
  const el=document.createElement('div');el.className='trail';
  const color=TRAIL_COLORS[trailCount%TRAIL_COLORS.length];trailCount++;
  const size=8+Math.random()*8,ox=(Math.random()-0.5)*16,oy=(Math.random()-0.5)*16,dur=0.6+Math.random()*0.5,rot=Math.random()*360;
  el.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg"><path d="${STAR_D}" fill="${color}"/></svg>`;
  el.style.cssText=`left:${x-size/2+ox}px;top:${y-size/2+oy}px;width:${size}px;height:${size}px;--td:${dur}s;--ts:${0.9+Math.random()*0.4};--tr:${rot}deg;`;
  document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
}

const HEART_COLORS=['#ff3d8b','#ff6eb4','#ff9de2','#f472b6','#ec4899','#ff5ba0','#fba8d4'];
const HEART_D='M12 21C12 21 3 14 3 8.5C3 6 5 4 7.5 4C9.24 4 10.91 5.03 12 6.5C13.09 5.03 14.76 4 16.5 4C19 4 21 6 21 8.5C21 14 12 21 12 21Z';
function spawnHearts(x,y){
  const count=10+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const el=document.createElement('div');el.className='hp';
    const color=HEART_COLORS[Math.floor(Math.random()*HEART_COLORS.length)],size=(10+Math.random()*11)*0.7;
    el.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="${HEART_D}" fill="${color}"/></svg>`;
    const angle=(Math.PI*2/count)*i+(Math.random()-0.5)*0.9,dist=100+Math.random()*120;
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist,ty60=ty*0.35-20,dur=0.65+Math.random()*0.45;
    el.style.cssText=`left:${x-size/2}px;top:${y-size/2}px;width:${size}px;height:${size}px;--tx:${tx}px;--ty:${ty-50}px;--ty60:${ty60}px;--dur2:${dur}s;--s:${0.8+Math.random()*0.5};animation-delay:${Math.random()*0.08}s;`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

document.addEventListener('mousemove',e=>{
  cursorEl.style.left=e.clientX+'px';cursorEl.style.top=e.clientY+'px';
  const now=Date.now();if(now-lastTrailTime>12){spawnTrail(e.clientX,e.clientY);lastTrailTime=now;}
});
document.addEventListener('mousedown',e=>{cursorEl.classList.add('clicking');spawnHearts(e.clientX,e.clientY);});
document.addEventListener('mouseup',()=>cursorEl.classList.remove('clicking'));

const starsEl=document.getElementById('stars');
for(let i=0;i<70;i++){
  const s=document.createElement('div');s.className='star';const sz=1+Math.random()*2.5;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${2+Math.random()*5}s;--delay:-${Math.random()*6}s;`;
  starsEl.appendChild(s);
}

updateDday();renderCalendar();
</script>
</body>
